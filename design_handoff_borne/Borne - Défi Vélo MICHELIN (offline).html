document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

======== LEFT / BRAND ===================== -->\n    <div style=\"padding-bottom:8px\">\n      <div style=\"display:inline-flex;align-items:center;gap:9px;padding:6px 14px;border:2.5px solid #15140F;border-radius:999px;background:#FFCB1A;box-shadow:3px 3px 0 #15140F;font-weight:800;font-size:12px;letter-spacing:.05em;text-transform:uppercase\">Une application MICHELIN<\u002Fdiv>\n      <h1 style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:74px;line-height:.9;margin:20px 0 0;letter-spacing:.01em;color:#FFCB1A;text-shadow:0 2px 14px rgba(0,0,0,.25)\">MICHELIN<\u002Fh1>\n      <div style=\"height:13px;width:340px;max-width:100%;background:#FFCB1A;border:2.5px solid #15140F;border-radius:6px;box-shadow:3px 3px 0 #15140F;margin:9px 0 18px\"><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:22px;flex-wrap:wrap\">\n        <span style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:30px;color:#fff\">Borne<span style=\"color:#FFCB1A\">.<\u002Fspan><\u002Fspan>\n        <span style=\"font-weight:700;font-size:16px;color:#E9E2CF\">le jeu de parcours vélo de ta région.<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"font-size:19px;line-height:1.5;font-weight:600;max-width:450px;margin:0 0 26px;color:#EFE9D8;text-shadow:0 1px 10px rgba(0,0,0,.3)\">Grimpe la carte des parcours, bats les chronos, gagne tes étoiles. Les ambassadeurs créent les niveaux, MICHELIN te conseille le pneu. À toi de jouer.<\u002Fp>\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px;max-width:470px;margin-bottom:30px\">\n        <span style=\"padding:8px 15px;border:2.5px solid #15140F;border-radius:999px;font-weight:800;font-size:13px;background:#FFCB1A;box-shadow:3px 3px 0 #15140F\">Convivialité<\u002Fspan>\n        <span style=\"padding:8px 15px;border:2.5px solid #15140F;border-radius:999px;font-weight:800;font-size:13px;background:#7E9B5B;color:#fff;box-shadow:3px 3px 0 #15140F\">Écologie<\u002Fspan>\n        <span style=\"padding:8px 15px;border:2.5px solid #15140F;border-radius:999px;font-weight:800;font-size:13px;background:#fff;box-shadow:3px 3px 0 #15140F\">Aventure<\u002Fspan>\n        <span style=\"padding:8px 15px;border:2.5px solid #15140F;border-radius:999px;font-weight:800;font-size:13px;background:#1F4BA0;color:#fff;box-shadow:3px 3px 0 #15140F\">Dépassement<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"border:2.5px solid #15140F;border-radius:20px;background:#fff;box-shadow:5px 5px 0 #15140F;padding:17px 19px;max-width:460px\">\n        <div style=\"font-weight:800;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#1F4BA0;margin-bottom:14px\">La boucle du jeu<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:13px\">\n          <div style=\"display:flex;align-items:center;gap:13px\">\n            <span style=\"width:30px;height:30px;flex-shrink:0;border-radius:9px;border:2.5px solid #15140F;background:#FFCB1A;display:flex;align-items:center;justify-content:center;font-family:'Fredoka',sans-serif;font-weight:700;font-size:15px;box-shadow:2px 2px 0 #15140F\">1<\u002Fspan>\n            <span style=\"font-weight:700;font-size:14.5px\">Un <strong>ambassadeur crée un parcours<\u002Fstrong> et recommande la config.<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:13px\">\n            <span style=\"width:30px;height:30px;flex-shrink:0;border-radius:9px;border:2.5px solid #15140F;background:#1F4BA0;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Fredoka',sans-serif;font-weight:700;font-size:15px;box-shadow:2px 2px 0 #15140F\">2<\u002Fspan>\n            <span style=\"font-weight:700;font-size:14.5px\">Tu le joues, <strong>Strava chrono<\u002Fstrong> ton temps sur le classement.<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:13px\">\n            <span style=\"width:30px;height:30px;flex-shrink:0;border-radius:9px;border:2.5px solid #15140F;background:#7E9B5B;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Fredoka',sans-serif;font-weight:700;font-size:15px;box-shadow:2px 2px 0 #15140F\">3<\u002Fspan>\n            <span style=\"font-weight:700;font-size:14.5px\">Étoiles, médailles, rangs — et <strong>le pneu MICHELIN idéal<\u002Fstrong>.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===================== PHONE ===================== -->\n    <div style=\"width:392px;height:812px;background:#1F4BA0;border:3px solid #15140F;border-radius:48px;box-shadow:10px 10px 0 #15140F;padding:11px;position:relative\">\n      <div style=\"height:100%;border-radius:38px;overflow:hidden;background:#F3EAD3;display:flex;flex-direction:column;position:relative\">\n\n        <!-- status bar -->\n        <div style=\"height:38px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:#F3EAD3;font-weight:800;font-size:13px;position:relative;z-index:5\">\n          <span>9:41<\u002Fspan>\n          <div style=\"position:absolute;left:50%;top:9px;transform:translateX(-50%);width:88px;height:20px;background:#15140F;border-radius:999px\"><\u002Fdiv>\n          <div style=\"display:flex;gap:5px;align-items:center\">\n            <span style=\"width:18px;height:9px;border:2px solid #15140F;border-radius:3px;display:inline-block\"><\u002Fspan>\n            <span style=\"width:14px;height:9px;background:#15140F;border-radius:2px;display:inline-block\"><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- masthead -->\n        <div style=\"flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:4px 18px 10px;background:#F3EAD3;z-index:4\">\n          <div style=\"display:flex;flex-direction:column\">\n            <span style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:17px;color:#1F4BA0;letter-spacing:.02em;line-height:1\" e=\"position:absolute;inset:0;z-index:1\"><path d=\"{{ pathD }}\" fill=\"none\" stroke=\"#15140F\" stroke-width=\"5\" stroke-dasharray=\"1 15\" stroke-linecap=\"round\" opacity=\"0.55\"><\u002Fpath><\u002Fsvg>\n\n              <!-- side quest -->\n              <div onclick=\"{{ challenge.onPlay }}\" style=\"position:absolute;top:4px;right:6px;width:154px;border:3px solid #15140F;border-radius:17px;background:#FFCB1A;box-shadow:4px 4px 0 #15140F;padding:11px;z-index:3;cursor:pointer\" style-active=\"transform:translate(2px,2px);box-shadow:2px 2px 0 #15140F\">\n                <span style=\"display:inline-block;padding:2px 8px;border:2px solid #15140F;border-radius:999px;background:#1F4BA0;color:#fff;font-weight:800;font-size:9px;letter-spacing:.05em;text-transform:uppercase;margin-bottom:7px\">Side quest<\u002Fspan>\n                <div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:15px;line-height:1.05\">Défi de la semaine<\u002Fdiv>\n                <div style=\"font-weight:700;font-size:11px;color:#3a352a;margin:3px 0 9px\">{{ challenge.name }} · {{ challenge.reward }}<\u002Fdiv>\n                <div style=\"display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border:2px solid #15140F;border-radius:999px;background:#fff;font-weight:800;font-size:11px;box-shadow:2px 2px 0 #15140F\">Jouer <svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#15140F\" stroke-width=\"3.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"m13 6 6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n              <\u002Fdiv>\n\n              <!-- nodes -->\n              <sc-for list=\"{{ nodes }}\" as=\"n\" hint-placeholder-count=\"7\">\n                <div style=\"{{ n.wrapStyle }}\">\n                  <sc-if value=\"{{ n.completed }}\"><div style=\"{{ n.starStyle }}\">{{ n.stars }}<\u002Fdiv><\u002Fsc-if>\n                  <button onclick=\"{{ n.onClick }}\" style=\"{{ n.circleStyle }}\">\n                    <sc-if value=\"{{ n.locked }}\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6f6852\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"5\" y=\"11\" width=\"14\" height=\"9\" rx=\"2\"><\u002Frect><path d=\"M8 11V8a4 4 0 0 1 8 0v3\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n                    <sc-if value=\"{{ n.showNum }}\">{{ n.num }}<\u002Fsc-if>\n                  <\u002Fbutton>\n                  <div style=\"{{ n.nameStyle }}\">{{ n.name }}<\u002Fdiv>\n                  <sc-if value=\"{{ n.current }}\"><div style=\"margin-top:5px;padding:3px 10px;border:2px solid #15140F;border-radius:999px;background:#FFCB1A;font-weight:800;font-size:10px;box-shadow:2px 2px 0 #15140F\">JOUER ▸<\u002Fdiv><\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- ============ RUN DETAIL ============ -->\n          <sc-if value=\"{{ showRun }}\">\n          <div style=\"padding:0 0 26px;animation:popin .25s ease\">\n            <div style=\"position:relative;height:206px;background-image:url(&quot;8b3e161c-5fb6-4133-8cf3-ab799e675ac2&quot;);background-size:cover;background-position:center;border-bottom:3px solid #15140F\">\n              <div style=\"position:absolute;inset:0;background:linear-gradient(to top, rgba(11,30,72,.92), rgba(11,30,72,.15) 55%, rgba(11,30,72,.05))\"><\u002Fdiv>\n              <button onclick=\"{{ closeRun }}\" style=\"position:absolute;top:14px;left:14px;width:38px;height:38px;border:2.5px solid #15140F;border-radius:11px;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:2.5px 2.5px 0 #15140F\">\n                <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#15140F\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m15 18-6-6 6-6\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n              <div style=\"position:absolute;left:16px;right:16px;bottom:14px;color:#fff\">\n                <span style=\"{{ run.tierBadgeStyle }}\">Niveau {{ run.t.label }} · {{ run.t.sub }}<\u002Fspan>\n                <div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:26px;line-height:1.04;margin-top:8px;text-shadow:0 1px 8px rgba(0,0,0,.4)\">{{ run.name }}<\u002Fdiv>\n                <div style=\"font-weight:800;font-size:12.5px;opacity:.95;margin-top:3px\">Créé par {{ run.creator }} · Ambassadeur<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"padding:15px 18px 0\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:15px\">\n                <div style=\"display:flex;align-items:center;gap:8px\">\n                  <div style=\"display:flex;gap:1px\"><sc-for list=\"{{ run.starCells }}\" as=\"s\" hint-placeholder-count=\"5\"><span style=\"{{ s.style }}\">★<\u002Fspan><\u002Fsc-for><\u002Fdiv>\n                  <span style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:16px\">{{ run.starsTxt }}<\u002Fspan>\n                  <span style=\"font-weight:700;font-size:12px;color:#8a8068\">({{ run.reviewsTxt }})<\u002Fspan>\n                <\u002Fdiv>\n                <span style=\"font-weight:800;font-size:12px;color:#1F4BA0\">{{ run.playsTxt }}<\u002Fspan>\n              <\u002Fdiv>\n\n              <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:18px\">\n                <div style=\"border:2.5px solid #15140F;border-radius:14px;padding:10px;background:#fff;box-shadow:3px 3px 0 #15140F\"><div style=\"font-weight:700;font-size:10.5px;color:#6f6852\">Distance<\u002Fdiv><div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:17px\">{{ run.distTxt }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"border:2.5px solid #15140F;border-radius:14px;padding:10px;background:#fff;box-shadow:3px 3px 0 #15140F\"><div style=\"font-weight:700;font-size:10.5px;color:#6f6852\">Dénivelé<\u002Fdiv><div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:17px\">{{ run.denivTxt }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"border:2.5px solid #15140F;border-radius:14px;padding:10px;background:#fff;box-shadow:3px 3px 0 #15140F\"><div style=\"font-weight:700;font-size:10.5px;color:#6f6852\">Record<\u002Fdiv><div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:17px\">{{ run.time }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n\n              <!-- recommended config -->\n              <div style=\"border:3px solid #15140F;border-radius:20px;background:#1F4BA0;color:#F3EAD3;padding:16px;box-shadow:5px 5px 0 #15140F;margin-bottom:20px\">\n                <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:10px\">\n                  <span style=\"padding:4px 10px;border:2px solid #15140F;border-radius:999px;background:#FFCB1A;color:#15140F;font-weight:800;font-size:10px;letter-spacing:.04em;text-transform:uppercase;box-shadow:2px 2px 0 #15140F\">Reco du créateur<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:9px;margin-bottom:11px\">\n                  <span style=\"padding:5px 12px;border:2px solid #F3EAD3;border-radius:10px;font-weight:800;font-size:13px\">Vélo : {{ run.bikeTxt }}<\u002Fspan>\n                  <span style=\"padding:5px 12px;border:2px solid #FFCB1A;border-radius:10px;background:#FFCB1A;color:#15140F;font-weight:800;font-size:13px\">{{ run.tireTxt }}<\u002Fspan>\n                <\u002Fdiv>\n                <p style=\"font-weight:600;font-size:13px;line-height:1.5;margin:0;opacity:.95\">“{{ run.note }}”<\u002Fp>\n              <\u002Fdiv>\n\n              <!-- per-run leaderboard -->\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:11px\">\n                <h3 style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:18px;margin:0\">Classement du parcours<\u002Fh3>\n                <span style=\"font-weight:800;font-size:11px;color:#8a8068\">Meilleur temps<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"margin-bottom:20px\">\n                <sc-for list=\"{{ run.board }}\" as=\"p\" hint-placeholder-count=\"5\">\n                  <div style=\"{{ p.rowStyle }}\">\n                    <span style=\"{{ p.rankStyle }}\">{{ p.rank }}<\u002Fspan>\n                    <div style=\"{{ p.avStyle }}\">{{ p.init }}<\u002Fdiv>\n                    <div style=\"flex:1;min-width:0\"><div style=\"font-weight:800;font-size:13.5px\">{{ p.nm }}<\u002Fdiv><\u002Fdiv>\n                    <span style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:14px\">{{ p.time }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n\n              <!-- reviews -->\n              <h3 style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:18px;margin:0 0 11px\">Avis des riders<\u002Fh3>\n              <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:22px\">\n                <sc-for list=\"{{ run.reviews }}\" as=\"rv\" hint-placeholder-count=\"2\">\n                  <div style=\"border:2.5px solid #15140F;border-radius:15px;background:#fff;padding:12px;box-shadow:3px 3px 0 #15140F\">\n                    <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:7px\">\n                      <div style=\"width:30px;height:30px;border-radius:9px;border:2.5px solid #15140F;background:#7E9B5B;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px\">{{ rv.init }}<\u002Fdiv>\n                      <span style=\"font-weight:800;font-size:13px;flex:1\">{{ rv.name }}<\u002Fspan>\n                      <div style=\"display:flex;gap:1px\"><sc-for list=\"{{ rv.starCells }}\" as=\"s\" hint-placeholder-count= id #15140F;border-radius:20px;background:#1F4BA0;color:#F3EAD3;padding:16px;box-shadow:5px 5px 0 #15140F;margin-bottom:18px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:6px\"><span style=\"font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.04em;opacity:.9\">Cagnotte MICHELIN<\u002Fspan><span style=\"padding:3px 10px;border:2px solid #F3EAD3;border-radius:999px;font-weight:800;font-size:11px\">-10 % débloqué<\u002Fspan><\u002Fdiv>\n              <div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:34px;line-height:1;margin-bottom:11px\">3 450 <span style=\"font-size:17px\">pts<\u002Fspan><\u002Fdiv>\n              <div style=\"height:13px;border:2.5px solid #F3EAD3;border-radius:999px;background:rgba(255,255,255,.15);overflow:hidden;margin-bottom:7px\"><div style=\"{{ ambStyle }};height:100%;background:#FFCB1A\"><\u002Fdiv><\u002Fdiv>\n              <div style=\"font-weight:700;font-size:12px;opacity:.9\">Plus que 1 550 pts → statut Légende MICHELIN<\u002Fdiv>\n            <\u002Fdiv>\n\n            <h3 style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:18px;margin:0 0 11px\">Mes parcours publiés<\u002Fh3>\n            <div style=\"display:flex;flex-direction:column;gap:9px\">\n              <sc-for list=\"{{ myRuns }}\" as=\"run\" hint-placeholder-count=\"2\">\n                <div onclick=\"{{ run.onOpen }}\" style=\"display:flex;align-items:center;gap:12px;padding:11px;border:2.5px solid #15140F;border-radius:15px;background:#fff;box-shadow:3px 3px 0 #15140F;cursor:pointer\" style-active=\"transform:translate(2px,2px);box-shadow:1px 1px 0 #15140F\">\n                  <div style=\"{{ run.thumbBoxStyle }}\"><\u002Fdiv>\n                  <div style=\"flex:1;min-width:0\">\n                    <div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ run.name }}<\u002Fd uot;homeDept&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Isère · 38&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = { tab: \"accueil\", openRun: null, playing: false, boardScope: \"mensuel\", published: false, cTier: \"bleu\", cBike: \"gravel\" };\n\n  setTab = (t) => this.setState({ tab: t, openRun: null });\n  openRun = (id) => this.setState({ openRun: id, playing: false });\n  closeRun = () => this.setState({ openRun: null });\n  play = () => this.setState({ playing: true });\n  publish = () => this.setState({ published: true });\n\n  renderVals() {\n    const ink = \"#15140F\", yellow = \"#FFCB1A\", blue = \"#1F4BA0\", sage = \"#7E9B5B\", amber = \"#F2A30F\", red = \"#D4533A\";\n    const name = (this.props.riderName || \"Léa\").trim() || \"Léa\";\n    const dept = this.props.homeDept || \"Isère · 38\";\n    const S = this.state;\n    const PHOTO = (typeof window !== \"undefined\" && window.__resources && window.__resources.naturePhoto) || \"assets/nature-cycling.png\";\n    const youInit = (name[0] || \"L\") + \"M\";\n\n    const tiers = { vert: { label: \"Vert\", sub: \"Découverte\", col: sage }, bleu: { label: \"Bleu\", sub: \"Sport\", col: blue }, rouge: { label: \"Rouge\", sub: \"Engagé\", col: red }, noir: { label: \"Noir\", sub: \"Légende\", col: ink } };\n    const bikeLabel = { route: \"Route\", gravel: \"Gravel\", vtt: \"VTT\" };\n    const tireFor = { route: \"MICHELIN Power Road\", gravel: \"MICHELIN Power Gravel\", vtt: \"MICHELIN Wild Trail\" };\n    const starCells = (v) => [0, 1, 2, 3, 4].map((i) => ({ style: { color: i < Math.round(v) ? amber : \"#d8cfb8\", fontSize: \"13px\", lineHeight: 1 } }));\n\n    const reviews = [\n      { name: \"Inès B.\", init: \"IB\", txt: \"Tracé magnifique, chaque watt en vaut la peine.\", starCells: starCells(5) },\n      { name: \"Marco V.\", init: \"MV\", txt: \"Bien balisé. Prévois de l'eau, peu de ravito.\", starCells: starCells(4) },\n ator: \"@karim_d\", tier: \"noir\", dist: 64, deniv: 1840, time: \"3:12:05\", stars: 4.9, reviews: 74, plays: 1200, hot: true, bike: \"route\", note: \"15 km de montée sèche. Gère ton braquet, ne pars surtout pas trop fort.\" },\n      { id: \"foret\", name: \"Singletrack Forêt\", creator: \"@sophie.l\", tier: \"bleu\", dist: 24, deniv: 540, time: \"1:22:30\", stars: 4.4, reviews: 52, plays: 880, bike: \"vtt\", note: \"Boue garantie après la pluie : des crampons s'imposent.\" },\n      { id: \"plateau\", name: \"Plateau Gravel\", creator: \"@marco_v\", tier: \"rouge\", dist: 51, deniv: 920, time: \"2:30:00\", stars: 4.5, reviews: 41, plays: 640, bike: \"gravel\", note: \"Vent de face sur le plateau : reste en danseuse dans les bosses.\" },\n      { id: \"nuit\", name: \"Ride Nocturne\", creator: \"@lea.m\", tier: \"bleu\", dist: 30, deniv: 300, time: \"1:10:00\", stars: 4.7, reviews: 33, plays: 510, bike: \"route\", note: \"Éclairage obligatoire. Le coucher de soleil sur la vallée est magique.\" },\n      { id: \"mur\", name: \"Le Mur de Sassenage\", creator: \"@tomas_r\", tier: \"noir\", dist: 12, deniv: 680, time: \"0:42:00\", stars: 5.0, reviews: 88, plays: 1500, bike: \"route\", note: \"Court mais brutal : 18% de moyenne. Bonne chance.\" },\n      { id: \"canal\", name: \"Voie du Canal\", creator: \"@lea.m\", tier: \"vert\", dist: 22, deniv: 90, time: \"0:55:00\", stars: 4.5, reviews: 28, plays: 420, bike: \"gravel\", note: \"Ombragé et roulant le long de l'eau. Idéal par forte chaleur.\" },\n    ];\n    const fmtPlays = (n) => (n >= 1000 ? (n / 1000).toFixed(1).replace(\".0\", \"\") + \"k\" : \"\" + n) + \" runs\";\n    const runs = RAW.map((r) => ({\n      ...r, t: tiers[r.tier],\n      starsTxt: r.stars.toFixed(1), starCells: starCells(r.stars), reviewsTxt: r.reviews + \" avis\",\n      distTxt: r.dist + \" km\", denivTxt: r.deniv + \" m D+\", playsTxt: fmtPlays(r.plays),\n      bikeTxt: bikeLabel[r.bike], tireTxt: tireFor[r.bike],\n      tierBadgeStyle: { display: \"inline-flex\", alignItems: \"center\", gap: \"5px\", padding: \"3px 10px\", border: \"2px solid \" + ink, borderRadius: \"999px\", background: tiers[r.tier].col, color: \"#fff\", fontWeight: 800, fontSize: \"10.5px\" },\n      thumbStyle: { position: \"absolute\", inset: 0, backgroundImage: \"url('\" + PHOTO + \"')\", backgroundSize: \"cover\", backgroundPosition: \"center\" },\n      thumbBoxStyle: { width: \"54px\", height: \"54px\", borderRadius: \"12px\", border: \"2.5px solid \" + ink, flexShrink: 0, backgroundImage: \"url('\" + PHOTO + \"')\", backgroundSize: \"cover\", backgroundPosition: \"center\" },\n      onOpen: () => this.openRun(r.id),\n      board: mkRunBoard(), reviews,\n    }));\n    const byId = (id) => runs.find((x) => x.id === id);\n\n    // map nodes\n    const order = [\"lac\", \"foret\", \"cretes\", \"arzelier\", \"plateau\", \"nuit\", \"mur\"];\n    const nodeState = { lac: { completed: 2 }, foret: { completed: 1 }, cretes: { completed: 3 }, arzelier: { current: true }, plateau: { locked: true }, nuit: { locked: true }, mur: { locked: true } };\n    const xs = [104, 250, 150, 268, 96, 205, 286], ystep = 132, y0 = 80;\n    const pts = order.map((id, i) => ({ x: xs[i], y: y0 + i * ystep }));\n    const mapH = y0 + (order.length - 1) * ystep + 96;\n    let pathD = \"M \" + pts[0].x + \" \" + pts[0].y;\n    for (let i = 1; i < pts.length; i++) { const a = pts[i - 1], b = pts[i], my = (a.y + b.y) / 2; pathD += \" C \" + a.x + \" \" + my + \" \" + b.x + \" \" + my + \" \" + b.x + \" \" + b.y; }\n    const nodes = order.map((id, i) => {\n      const r = byId(id), st = nodeState[id], p = pts[i];\n      const locked = !!st.locked, current = !!st.current, done = st.completed != null;\n      const col = locked ? \"#cfc6ad\" : r.t.col;\n      return {\n        id, name: r.name, num: i + 1, locked, current, completed: done, showNum: !locked,\n        stars: done ? \"★\".repeat(st.completed) : \"\",\n        onClick: locked ? (() => {}) : (() => t
