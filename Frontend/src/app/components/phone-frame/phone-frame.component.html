<div class="phone-frame">
  <div class="phone-screen">

    <!-- Status bar -->
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="notch"></div>
      <div class="status-icons">
        <!-- Signal bars -->
        <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor">
          <rect x="0" y="7" width="3" height="5" rx="1"/>
          <rect x="4.5" y="4.5" width="3" height="7.5" rx="1"/>
          <rect x="9" y="2" width="3" height="10" rx="1"/>
          <rect x="13.5" y="0" width="2.5" height="12" rx="1"/>
        </svg>
        <!-- Battery -->
        <svg width="22" height="11" viewBox="0 0 22 11" fill="none">
          <rect x=".5" y=".5" width="18" height="10" rx="2.5" stroke="currentColor" stroke-width="1"/>
          <rect x="2" y="2" width="13" height="7" rx="1.5" fill="currentColor"/>
          <path d="M20 3.5v4a1.5 1.5 0 0 0 0-4Z" fill="currentColor"/>
        </svg>
      </div>
    </div>

    <!-- Masthead -->
    <div class="masthead">
      <div class="masthead-left">
        <span class="masthead-title">MICHELIN</span>
        <span class="masthead-sub">Borne · Parcours</span>
      </div>
      <div class="masthead-badge">
        <span class="badge-dot">●</span> Rang Or
      </div>
    </div>

    <!-- Screen content (tabs or route detail overlay) -->
    <div class="screen-content">

      @if (state.openRun()) {
        <div class="tab-view popin">
          <app-route-detail />
        </div>
      } @else {
        @switch (state.tab()) {
          @case ('accueil') {
            <div class="tab-view">
              <app-carte />
            </div>
          }
          @case ('explorer') {
            <div class="tab-view">
              <app-explorer />
            </div>
          }
          @case ('creer') {
            <div class="tab-view">
              <app-creer />
            </div>
          }
          @case ('classement') {
            <div class="tab-view">
              <app-classement />
            </div>
          }
          @case ('profil') {
            <div class="tab-view">
              <app-profil />
            </div>
          }
        }
      }

    </div>

    <!-- Bottom navigation -->
    <app-bottom-nav />

  </div>
</div>
